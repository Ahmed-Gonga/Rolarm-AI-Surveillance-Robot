<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#101827"><link rel="manifest" href="/static/manifest.json"><link rel="stylesheet" href="/static/style.css"><title>{{project_name}}</title></head><body><header><h1>{{project_name}}</h1><a href="/logout">Logout</a></header><main><section class="camera card"><img src="/video_feed" id="video"><div id="banner">Connecting...</div></section><section class="grid"><div class="card"><h2>Robot Control</h2><div class="pad"><button onclick="move('forward')">▲</button><button onclick="move('left')">◀</button><button onclick="move('stop')">■</button><button onclick="move('right')">▶</button><button onclick="move('backward')">▼</button></div><label>Speed <input id="speed" type="range" min="0" max="100" value="70" oninput="setSpeed(this.value)"></label></div><div class="card"><h2>Security</h2><button onclick="arm(true)">Arm</button><button onclick="arm(false)">Disarm</button><button class="dangerBtn" onclick="alarm(true)">Alarm ON</button><button onclick="alarm(false)">Alarm OFF</button><p id="security"></p></div><div class="card"><h2>Face Enrollment</h2><input id="person" placeholder="Person name" value="Owner"><button onclick="capture()">Capture Face</button><button onclick="train()">Train Model</button><p id="trainStatus"></p></div><div class="card"><h2>Sensors</h2><ul><li>Gas: <b id="gas">-</b></li><li>Fire: <b id="fire">-</b></li><li>PIR motion: <b id="pir">-</b></li><li>Alarm: <b id="alarm">-</b></li></ul></div><div class="card wide"><h2>Known People</h2><div id="people"></div></div><div class="card wide"><h2>Event Log</h2><div id="events"></div></div></section></main><script src="/static/app.js"></script></body></html>
